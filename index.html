<!DOCTYPE html>
<html>
<head>
  <title>Prompt Test</title>
</head>
<body>

<script>
  const username = prompt("Enter username:");
  const password = prompt("Enter password:");

  if (username === "admin" && password === "1234") {
    alert("Welcome!");
  } else {
    alert("Wrong credentials.");
  }
</script>

</body>
</html>
